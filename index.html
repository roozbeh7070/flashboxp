<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>flashboxp</title>
    
    <!-- PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="flashboxp">
    <meta name="theme-color" content="#1c4849">
    <link rel="manifest" href="./manifest.json?v=1.1">
    <link rel="apple-touch-icon" href="doc/icon.png">

    <!-- External Assets -->
    <script src="./js/tailwind-cdn.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="pb-28 overflow-x-hidden">

    <div class="pt-8 px-4 relative z-10">
        <img src="./doc/logo.png" alt="Logo" class="h-20 mx-auto object-contain">
    </div>

    <!-- Home Screen -->
    <div id="home-screen">
        <div class="p-4 space-y-3">
            <button onclick="app.openFolderModal()" class="w-full blue-sharp p-5 rounded-2xl font-black flex justify-between items-center shadow-lg active:scale-95 transition-all">
                <span>افزودن مجموعه جدید</span>
                <i class="fas fa-folder-plus text-2xl"></i>
            </button>
        </div>

        <div id="system-folder-list" class="px-4 mb-8 grid grid-cols-3 gap-3"></div>
        <div id="folder-list" class="px-4 pb-20"></div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="nav-item active" id="nav-home" onclick="app.goHome()">
            <i class="fas fa-home"></i>
            <span>خانه</span>
        </div>
        <div class="nav-item" id="nav-search" onclick="app.openGlobalSearchModal()">
            <i class="fas fa-search"></i>
            <span>جستجو</span>
        </div>
        <div class="nav-item" id="nav-settings" onclick="app.openSettingsModal()">
            <i class="fas fa-cog"></i>
            <span>تنظیمات</span>
        </div>
    </div>

    <!-- Word Screen -->
    <div id="word-screen" class="hidden relative z-20">
        <div class="p-4 space-y-3">
            <div id="folder-title-box" class="blue-sharp p-4 rounded-3xl flex justify-between items-center font-black text-xl shadow-lg">
                <div id="folder-title-text" class="flex-1 text-right truncate px-2">نام مجموعه</div>
                <div class="flex gap-2">
                    <div id="del-folder-btn-wrapper" class="w-12 h-12">
                        <button id="del-folder-btn" onclick="app.confirmDeleteFolder()" class="w-full h-full bg-white text-red-500 rounded-2xl flex items-center justify-center shadow-sm active:scale-95 transition-all">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                    <div id="folder-word-count-box" class="w-12 h-12 bg-white text-[#303030] rounded-2xl flex items-center justify-center shadow-sm font-black text-sm">0</div>
                    <button onclick="app.goHome()" class="w-12 h-12 bg-white text-gray-800 rounded-2xl flex items-center justify-center shadow-sm active:scale-95 transition-all">
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </div>
            </div>
            <div id="add-word-container" class="ios-card p-5 mt-4 border border-gray-100">
                <div class="flex flex-col gap-3 mb-4">
                    <div class="relative w-full">
                        <input id="eng-input" type="text" placeholder="Word (English)" dir="ltr" class="w-full p-4 pr-24 bg-gray-200 rounded-xl outline-none font-bold text-lg text-gray-900">
                        <div class="absolute inset-y-0 right-0 flex items-center gap-1 pr-2">
                            <button onclick="app.startVoiceInput('eng-input', 'en-US')" class="w-10 h-10 text-orange-500 flex items-center justify-center transition-all active:scale-90"><i class="fas fa-microphone text-lg"></i></button>
                            <button onclick="app.pasteFromClipboard('eng-input')" class="w-10 h-10 text-gray-600 flex items-center justify-center"><i class="fas fa-paste text-lg"></i></button>
                        </div>
                    </div>
                    <div class="flex gap-2 w-full items-center">
                        <div class="relative flex-1">
                            <input id="per-input" type="text" placeholder="معنی (فارسی)" class="w-full p-4 pl-24 bg-gray-200 rounded-xl outline-none font-bold text-right text-lg text-gray-900">
                            <div class="absolute inset-y-0 left-0 flex items-center gap-1 pl-2">
                                <button onclick="app.pasteFromClipboard('per-input')" class="w-10 h-10 text-gray-600 flex items-center justify-center"><i class="fas fa-paste text-lg"></i></button>
                                <button id="per-mic-btn" onclick="app.startVoiceInput('per-input', 'fa-IR')" class="w-10 h-10 text-orange-500 flex items-center justify-center transition-all active:scale-90"><i class="fas fa-microphone text-lg"></i></button>
                            </div>
                        </div>
                        <button onclick="app.getTranslation()" class="w-14 h-14 bg-orange-500 text-white rounded-xl flex items-center justify-center shadow-sm active:scale-95"><i class="fas fa-exchange-alt text-lg"></i></button>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="app.checkDuplicateBeforeAdd()" class="flex-[2] blue-sharp p-4 rounded-2xl font-black text-lg shadow-md active:scale-95 transition-all">ذخیره</button>
                    <button onclick="app.openExploreModal()" class="flex-[3] bg-white text-orange-500 p-4 rounded-2xl font-black text-lg shadow-sm active:bg-gray-50 transition-all flex items-center justify-center gap-2">
                        <i class="fas fa-search text-sm"></i> جستجوی پیشرفته
                    </button>
                </div>
            </div>
            
            <div class="px-1 pt-1 space-y-3">
                <div class="bg-white rounded-2xl p-1 shadow-sm border border-gray-100 flex gap-1 h-14">
                    <button onclick="app.showQuizConfig()" class="w-24 bg-orange-500 text-white rounded-xl font-black text-sm flex items-center justify-center gap-2 active:scale-95 transition-all">
                        <i class="fas fa-play-circle text-lg"></i> آزمون
                    </button>
                    <div class="flex-1 flex">
                        <button onclick="app.setWordFilter('all', this)" class="word-filter-btn flex-1 py-3 rounded-xl font-black text-sm active bg-gray-100 text-gray-800">همه</button>
                        <button onclick="app.setWordFilter('success', this)" class="word-filter-btn flex-1 py-3 rounded-xl font-black text-sm text-gray-400">موفق</button>
                        <button onclick="app.setWordFilter('failed', this)" class="word-filter-btn flex-1 py-3 rounded-xl font-black text-sm text-gray-400">ناموفق</button>
                    </div>
                </div>
                <div class="relative w-full">
                    <input id="search-input" type="text" oninput="app.handleSearchInput(this)" placeholder="جستجو در این مجموعه (کلمه یا معنی)..." class="w-full p-4 pr-4 pl-12 bg-white rounded-2xl border border-gray-100 shadow-sm outline-none text-gray-700 font-bold">
                    <button id="search-clear-btn" onclick="app.clearSearch()" class="hidden absolute inset-y-0 left-0 w-12 flex items-center justify-center text-gray-300 active:text-gray-500">
                        <i class="fas fa-times-circle text-xl"></i>
                    </button>
                </div>
            </div>

            <div id="word-list" class="pb-32"></div>
        </div>
    </div>

    <!-- Modal Container -->
    <div id="modal-container" class="hidden fixed inset-0 modal-overlay flex items-center justify-center p-6"></div>

    <!-- Quiz Screen -->
    <div id="quiz-screen" class="hidden fixed inset-0 bg-white z-40 p-6 flex flex-col pt-12">
        <div class="flex flex-col mb-6">
            <div class="flex justify-between items-center">
                <span id="quiz-progress" class="text-gray-400 font-black text-lg">۱ از ۱۰</span>
                <button onclick="app.closeScreen('quiz-screen')" class="text-gray-300"><i class="fas fa-times-circle text-4xl"></i></button>
            </div>
            <div class="progress-bar-container">
                <div id="quiz-progress-bar" class="progress-bar-fill"></div>
            </div>
        </div>
        <div class=" flex flex-col items-center justify-center">
            <div id="flashcard" class="w-full h-96 bg-white border border-gray-50 shadow-2xl rounded-[50px] flex flex-col items-center justify-center p-8 text-center relative active:scale-95 transition-all" onclick="app.flipCard()">
                <div id="quiz-tag" class="absolute top-8 right-8 px-5 py-2 rounded-full text-xs font-black uppercase tracking-tighter"></div>
                <h3 id="quiz-main-text" class="text-5xl font-black mb-6 text-gray-900">Word</h3>
                <p id="quiz-sub-text" class="text-3xl text-blue-600 font-bold hidden">معنی</p>
                <button onclick="app.speakWordInQuiz(event)" class="mt-8 p-6 bg-blue-50 rounded-full text-blue-500 active:bg-blue-100 transition-colors"><i class="fas fa-volume-up text-4xl"></i></button>
            </div>
        </div>
        <div class="grid grid-cols-2 gap-4 mt-10 mb-6">
            <button onclick="app.quizResult(false)" class="bg-red-50 text-red-500 py-6 rounded-[30px] font-black border-2 border-red-100 text-lg active:bg-red-100">بلد نبودم</button>
            <button onclick="app.quizResult(true)" class="bg-green-50 text-green-500 py-6 rounded-[30px] font-black border-2 border-green-100 text-lg active:bg-green-100">بلد بودم</button>
            <button onclick="app.moveQuiz()" class="col-span-2 bg-gray-50 text-gray-400 py-5 rounded-2xl font-black text-sm active:bg-gray-100">مشاهده کلمه بعدی (بدون تغییر وضعیت)</button>
        </div>
    </div>

    <!-- Main App Script -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
